global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "alebus_observability"
    metrics_path: /metrics
    static_configs:
      - targets: ["observability-server:9099"]

  # Phase 3: scrape the API host metrics.
  # Local dev (Windows/macOS Docker Desktop): run cmd/api on the host and scrape via host.docker.internal.
  - job_name: "alebus_api"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
